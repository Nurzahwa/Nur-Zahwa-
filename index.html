<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Website Tugas</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', sans-serif;
    }

    body {
      height: 100vh;
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
    }

    .container {
      text-align: center;
    }

    h1 {
      margin-bottom: 40px;
      font-size: 32px;
    }

    .menu {
      display: flex;
      gap: 30px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .card {
      background: rgba(255,255,255,0.1);
      padding: 40px;
      border-radius: 20px;
      width: 250px;
      text-decoration: none;
      color: white;
      backdrop-filter: blur(10px);
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-10px) scale(1.05);
      background: rgba(255,255,255,0.2);
    }

    .card h2 {
      margin-bottom: 10px;
    }

    .card p {
      font-size: 14px;
      opacity: 0.9;
    }

  </style>
</head>

<body>

<div class="container">
  <h1>Website Tugas</h1>

  <div class="menu">

    <!-- TUGAS 1 -->
    <a href="tugas1.html" class="card">
      <h2>Tugas 1</h2>
      <p>Biodata, Galeri, dan Video</p>
    </a>

    <!-- TUGAS 2 -->
    <a href="tugas2.html" class="card">
      <h2>Tugas 2</h2>
      <p>Formulir Data Pengguna</p>
    </a>

  </div>
</div>

</body>
</html>
