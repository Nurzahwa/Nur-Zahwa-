<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Galeri Saya</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', sans-serif;
    }

    body {
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      color: white;
    }

    /* Navbar */
    nav {
      background: rgba(0, 0, 0, 0.7);
      padding: 15px;
      text-align: center;
    }

    nav a {
      color: white;
      margin: 0 15px;
      text-decoration: none;
      font-weight: bold;
      transition: 0.3s;
    }

    nav a:hover {
      color: #00d4ff;
    }

    h1 {
      text-align: center;
      margin: 30px 0;
    }

    /* Gallery Grid */
    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
      padding: 20px 40px;
    }

    /* Card Image */
    .card {
      position: relative;
      overflow: hidden;
      border-radius: 15px;
      cursor: pointer;
      box-shadow: 0 10px 20px rgba(0,0,0,0.3);
    }

    .card img {
      width: 100%;
      height: 100%;
      display: block;
      transition: 0.5s;
    }

    /* Overlay Effect */
    .overlay {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.6);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      opacity: 0;
      transition: 0.5s;
      font-size: 18px;
      font-weight: bold;
    }

    /* Hover Effect */
    .card:hover img {
      transform: scale(1.1);
    }

    .card:hover .overlay {
      opacity: 1;
    }

    /* Footer */
    footer {
      margin-top: 40px;
      padding: 15px;
      text-align: center;
      background: rgba(0,0,0,0.7);
    }
  </style>

</head>
<body>

  <!-- Navbar -->
  <nav>
    <a href="index.html">Home</a>
    <a href="biodata.html">Biodata</a>
    <a href="galery.html">Galeri</a>
    <a href="video.html">Video</a>
  </nav>

  <h1>Galeri Saya</h1>

  <!-- Gallery -->
  <div class="gallery">

    <div class="card">
      <img src="Rumah depan.jpeg">
      <div class="overlay">Foto 1</div>
    </div>

    <div class="card">
      <img src="kiri.jpeg">
      <div class="overlay">Foto 2</div>
    </div>

    <div class="card">
      <img src="https://via.placeholder.com/300x200">
      <div class="overlay">Foto 3</div>
    </div>

    <div class="card">
      <img src="https://via.placeholder.com/300x200">
      <div class="overlay">Foto 4</div>
    </div>

  </div>

  <!-- Footer -->
  <footer>
    <p>© 2026 Website Saya</p>
  </footer>

</body>
</html>
